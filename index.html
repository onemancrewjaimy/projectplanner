<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONEMANCREW — Projecttracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #202020;
      --bg-dark: #1a1a1a;
      --bg-darker: #161616;
      --bg-hover: #252525;
      --border: #2e2e2e;
      --border-light: #282828;
      --text: #ffffff;
      --text-muted: #777;
      --text-dim: #555;
      --text-dimmer: #444;
      --text-faint: #333;
      --accent: #d07335;
      --accent-hover: #e8854a;
      --accent-subtle: rgba(208, 115, 53, 0.12);
      --accent-border: rgba(208, 115, 53, 0.3);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--bg-dark);
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
    }

    .logo span { color: var(--accent); }

    .btn-add {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 9px 20px;
      font-family: 'Poppins', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-add:hover { background: var(--accent-hover); }

    /* ── FILTERS ── */
    .filters {
      background: var(--bg-dark);
      border-bottom: 1px solid var(--border);
      padding: 12px 32px;
      display: flex;
      gap: 0;
    }

    .filter-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: 'Poppins', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      padding: 5px 22px 5px 0;
      transition: color 0.2s;
      position: relative;
    }

    .filter-btn:not(:last-child)::after {
      content: '';
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 10px;
      background: var(--border);
    }

    .filter-btn.active { color: var(--accent); }
    .filter-btn:hover:not(.active) { color: #aaa; }

    /* ── STATS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }

    .stat {
      background: var(--bg);
      padding: 16px 32px;
    }

    .stat-num {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
    }

    .stat-num.accent { color: var(--accent); }
    .stat-num.dim { color: var(--text-dim); }

    .stat-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* ── TABLE HEADER ── */
    .col-head {
      display: grid;
      grid-template-columns: 36px 1fr 160px 160px 130px 120px;
      gap: 0;
      padding: 10px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-darker);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dimmer);
    }

    /* ── PROJECT ROWS ── */
    .project-row {
      display: grid;
      grid-template-columns: 36px 1fr 160px 160px 130px 120px;
      align-items: center;
      padding: 0 32px;
      border-bottom: 1px solid var(--border-light);
      min-height: 66px;
      transition: background 0.15s;
    }

    .project-row:hover { background: var(--bg-hover); }
    .project-row.completed { opacity: 0.4; }

    /* ── CHECKBOX ── */
    .project-check {
      width: 17px;
      height: 17px;
      border: 1px solid #3a3a3a;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.2s, background 0.2s;
    }

    .project-check:hover { border-color: var(--accent); }

    .project-check.checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .project-check.checked::after {
      content: '';
      width: 8px;
      height: 5px;
      border-left: 1.5px solid #fff;
      border-bottom: 1.5px solid #fff;
      transform: rotate(-45deg) translateY(-1px);
      display: block;
    }

    /* ── PROJECT INFO ── */
    .project-info { padding: 0 16px 0 12px; }

    .project-client {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .project-title {
      font-size: 11px;
      font-weight: 300;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* ── DATES ── */
    .project-date {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-muted);
    }

    .project-date small {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dimmer);
      display: block;
      margin-bottom: 2px;
    }

    /* ── FACTUUR ── */
    .factuur {
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    /* ── STATUS BADGE ── */
    .status-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-badge {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 10px;
      font-family: 'Poppins', sans-serif;
    }

    .status-productie {
      background: var(--accent-subtle);
      color: var(--accent);
      border: 1px solid var(--accent-border);
    }

    .status-afgerond {
      background: rgba(255,255,255,0.04);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    /* ── DELETE BTN ── */
    .delete-btn {
      background: none;
      border: none;
      color: var(--text-faint);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      transition: color 0.2s;
      line-height: 1;
    }

    .delete-btn:hover { color: #c0392b; }

    /* ── EMPTY STATE ── */
    .empty {
      padding: 56px 32px;
      text-align: center;
      color: var(--text-faint);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal {
      background: var(--bg-dark);
      border: 1px solid var(--border);
      padding: 30px;
      width: 440px;
      max-width: 94vw;
    }

    .modal-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 22px;
    }

    .form-group { margin-bottom: 14px; }

    .form-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      display: block;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      font-weight: 400;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: #3a3a3a; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 22px;
    }

    .btn-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: 'Poppins', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 9px 18px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-cancel:hover { border-color: #555; color: #aaa; }

    .btn-save {
      background: var(--accent);
      border: none;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 9px 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-save:hover { background: var(--accent-hover); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .col-head { display: none; }

      .project-row {
        grid-template-columns: 28px 1fr auto;
        grid-template-rows: auto auto;
        padding: 14px 20px;
        min-height: unset;
        gap: 4px;
      }

      .project-check { grid-row: 1 / 3; align-self: start; margin-top: 3px; }
      .project-info { grid-column: 2; grid-row: 1; padding: 0 8px; }
      .project-date { display: none; }
      .factuur { grid-column: 2; grid-row: 2; padding: 0 8px; font-size: 10px; }
      .status-wrap { grid-column: 3; grid-row: 1 / 3; flex-direction: column; align-items: flex-end; gap: 6px; }

      .header { padding: 14px 20px; }
      .filters { padding: 10px 20px; }
      .stat { padding: 12px 20px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="logo">ONE<span>MAN</span>CREW</div>
    <button class="btn-add" onclick="openModal()">+ Nieuw project</button>
  </header>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('alles', this)">Alles</button>
    <button class="filter-btn" onclick="setFilter('productie', this)">In productie</button>
    <button class="filter-btn" onclick="setFilter('afgerond', this)">Afgerond</button>
  </div>

  <div class="stats" id="stats"></div>

  <div class="col-head">
    <div></div>
    <div>Klant / Project</div>
    <div>Opnamedatum</div>
    <div>Leverdatum</div>
    <div>Factuur</div>
    <div>Status</div>
  </div>

  <div id="projects-list"></div>
  <div id="modal-container"></div>

  <script>
    const STORAGE_KEY = 'omc_projects';

    function load() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ projects, nextId }));
    }

    const stored = load();
    let projects = stored?.projects ?? [
      { id: 1, client: 'Mileway', title: 'Onboarding video', opname: '2025-03-10', levering: '2025-03-28', factuur: 'OMC-2025-001', done: false },
      { id: 2, client: 'ABN AMRO', title: 'Case study klantenverhaal', opname: '2025-04-02', levering: '2025-04-20', factuur: 'OMC-2025-002', done: true },
      { id: 3, client: 'Kotlin Dev Day', title: 'Event aftermovie', opname: '2025-04-15', levering: '2025-05-01', factuur: 'OMC-2025-003', done: false },
      { id: 4, client: 'KKNH', title: 'Promotievideo', opname: '2025-05-06', levering: '2025-05-22', factuur: 'OMC-2025-004', done: false },
    ];
    let nextId = stored?.nextId ?? 5;
    let activeFilter = 'alles';

    function fmt(d) {
      if (!d) return '—';
      return new Date(d + 'T00:00:00').toLocaleDateString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function setFilter(f, el) {
      activeFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      render();
    }

    function toggleDone(id) {
      const p = projects.find(x => x.id === id);
      if (p) { p.done = !p.done; save(); render(); }
    }

    function deleteProject(id) {
      if (!confirm('Project verwijderen?')) return;
      projects = projects.filter(x => x.id !== id);
      save();
      render();
    }

    function render() {
      let filtered = projects;
      if (activeFilter === 'productie') filtered = projects.filter(p => !p.done);
      if (activeFilter === 'afgerond') filtered = projects.filter(p => p.done);

      const total = projects.length;
      const prod = projects.filter(p => !p.done).length;
      const done = projects.filter(p => p.done).length;

      document.getElementById('stats').innerHTML = `
        <div class="stat"><div class="stat-num">${total}</div><div class="stat-label">Totaal</div></div>
        <div class="stat"><div class="stat-num accent">${prod}</div><div class="stat-label">In productie</div></div>
        <div class="stat"><div class="stat-num dim">${done}</div><div class="stat-label">Afgerond</div></div>
      `;

      if (!filtered.length) {
        document.getElementById('projects-list').innerHTML = '<div class="empty">Geen projecten gevonden</div>';
        return;
      }

      document.getElementById('projects-list').innerHTML = filtered.map(p => `
        <div class="project-row ${p.done ? 'completed' : ''}">
          <div class="project-check ${p.done ? 'checked' : ''}" onclick="toggleDone(${p.id})" title="${p.done ? 'Markeer als in productie' : 'Markeer als afgerond'}"></div>
          <div class="project-info">
            <div class="project-client">${esc(p.client)}</div>
            <div class="project-title">${esc(p.title)}</div>
          </div>
          <div class="project-date"><small>Opname</small>${fmt(p.opname)}</div>
          <div class="project-date"><small>Levering</small>${fmt(p.levering)}</div>
          <div class="factuur">${esc(p.factuur)}</div>
          <div class="status-wrap">
            <span class="status-badge ${p.done ? 'status-afgerond' : 'status-productie'}">${p.done ? 'Afgerond' : 'Productie'}</span>
            <button class="delete-btn" onclick="deleteProject(${p.id})" title="Verwijder project">&#x1F5D1;</button>
          </div>
        </div>
      `).join('');
    }

    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function openModal(editId) {
      const p = editId ? projects.find(x => x.id === editId) : null;
      document.getElementById('modal-container').innerHTML = `
        <div class="modal-overlay" onclick="overlayClose(event)">
          <div class="modal">
            <div class="modal-title">${p ? 'Project bewerken' : 'Nieuw project toevoegen'}</div>
            <div class="form-group">
              <label class="form-label">Klantnaam</label>
              <input class="form-input" id="f-client" placeholder="Bijv. Rabobank" value="${p ? esc(p.client) : ''}" />
            </div>
            <div class="form-group">
              <label class="form-label">Projectomschrijving</label>
              <input class="form-input" id="f-title" placeholder="Bijv. Corporate film" value="${p ? esc(p.title) : ''}" />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Opnamedatum</label>
                <input class="form-input" id="f-opname" type="date" value="${p ? p.opname : ''}" />
              </div>
              <div class="form-group">
                <label class="form-label">Leverdatum</label>
                <input class="form-input" id="f-levering" type="date" value="${p ? p.levering : ''}" />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Factuurnummer</label>
              <input class="form-input" id="f-factuur" placeholder="Bijv. OMC-2025-005" value="${p ? esc(p.factuur) : ''}" />
            </div>
            <div class="modal-actions">
              <button class="btn-cancel" onclick="closeModal()">Annuleren</button>
              <button class="btn-save" onclick="saveProject(${editId || ''})">Opslaan</button>
            </div>
          </div>
        </div>
      `;
      setTimeout(() => document.getElementById('f-client').focus(), 50);
    }

    function overlayClose(e) {
      if (e.target.classList.contains('modal-overlay')) closeModal();
    }

    function closeModal() {
      document.getElementById('modal-container').innerHTML = '';
    }

    function saveProject(editId) {
      const client = document.getElementById('f-client').value.trim();
      const title = document.getElementById('f-title').value.trim();
      const opname = document.getElementById('f-opname').value;
      const levering = document.getElementById('f-levering').value;
      const factuur = document.getElementById('f-factuur').value.trim();
      if (!client) { document.getElementById('f-client').focus(); return; }

      if (editId) {
        const p = projects.find(x => x.id === editId);
        if (p) { p.client = client; p.title = title; p.opname = opname; p.levering = levering; p.factuur = factuur || '—'; }
      } else {
        projects.push({ id: nextId++, client, title, opname, levering, factuur: factuur || '—', done: false });
      }

      save();
      closeModal();
      render();
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    render();
  </script>
</body>
</html>
