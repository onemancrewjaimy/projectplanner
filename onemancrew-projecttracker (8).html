<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ONEMANCREW — Projecttracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #202020; --bg-dark: #1a1a1a; --bg-darker: #161616; --bg-hover: #252525;
      --border: #2e2e2e; --border-light: #282828; --text: #ffffff; --text-muted: #777;
      --text-dim: #555; --text-dimmer: #444; --text-faint: #333;
      --accent: #d07335; --accent-hover: #e8854a;
      --accent-subtle: rgba(208,115,53,0.12); --accent-border: rgba(208,115,53,0.3);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; min-height: 100vh; }
    .sync-bar { background: var(--bg-darker); border-bottom: 1px solid var(--border); padding: 8px 28px; display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 500; color: var(--text-dim); letter-spacing: 0.04em; min-height: 32px; }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-faint); flex-shrink: 0; transition: background 0.3s; }
    .sync-dot.syncing { background: var(--accent); animation: pulse 1s infinite; }
    .sync-dot.ok { background: #4caf7d; box-shadow: 0 0 6px rgba(76,175,125,0.6); }
    .sync-dot.error { background: #c0392b; box-shadow: 0 0 6px rgba(192,57,43,0.6); }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
    .header { background: linear-gradient(180deg, #1e1e1e 0%, #1a1a1a 100%); border-bottom: 1px solid var(--border); border-top: 2px solid var(--accent); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 5; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
    .header-brand { display: flex; align-items: center; gap: 14px; }
    .header-brand img { height: 36px; width: auto; display: block; }
    .header-brand-text { font-size: 14px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text); border-left: 1px solid #3a3a3a; padding-left: 14px; }
    .header-brand-text span { color: var(--accent); }
    .btn-add { background: linear-gradient(135deg, #e8854a 0%, #d07335 50%, #b85e25 100%); color: #fff; border: none; padding: 9px 20px; font-family: 'Poppins', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 12px rgba(208,115,53,0.4); }
    .btn-add:hover { background: linear-gradient(135deg, #f09055 0%, #e8854a 50%, #d07335 100%); box-shadow: 0 4px 20px rgba(208,115,53,0.6); transform: translateY(-1px); }
    .filters { background: var(--bg-dark); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; gap: 0; }
    .filter-btn { background: none; border: none; color: var(--text-dim); font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; padding: 5px 24px 5px 0; transition: color 0.2s; position: relative; }
    .filter-btn:not(:last-child)::after { content: ''; position: absolute; right: 11px; top: 50%; transform: translateY(-50%); width: 1px; height: 10px; background: var(--border); }
    .filter-btn.active { color: var(--accent); }
    .filter-btn:hover:not(.active) { color: #aaa; }
    .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
    .stat { background: linear-gradient(180deg, #222222 0%, #202020 100%); padding: 20px 28px; }
    .stat-num { font-size: 30px; font-weight: 700; color: var(--text); }
    .stat-num.accent { color: var(--accent); text-shadow: 0 0 20px rgba(208,115,53,0.5); }
    .stat-num.dim { color: var(--text-dim); }
    .stat-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); margin-top: 4px; }
    .col-head { display: grid; grid-template-columns: 32px 2fr 1fr 1fr 1fr 1.4fr; gap: 0; padding: 12px 28px; border-bottom: 1px solid var(--border); background: linear-gradient(180deg, #181818 0%, #161616 100%); font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dimmer); }
    .project-row { display: grid; grid-template-columns: 32px 2fr 1fr 1fr 1fr 1.4fr; align-items: center; padding: 0 28px; border-bottom: 1px solid var(--border-light); min-height: 76px; transition: background 0.15s; }
    .project-row:hover { background: linear-gradient(90deg, rgba(208,115,53,0.06) 0%, #252525 40%); }
    .project-row.completed { opacity: 0.4; }
    .project-check { width: 17px; height: 17px; border: 1px solid #3a3a3a; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: border-color 0.2s, background 0.2s; }
    .project-check:hover { border-color: var(--accent); }
    .project-check.checked { background: var(--accent); border-color: var(--accent); }
    .project-check.checked::after { content: ''; width: 8px; height: 5px; border-left: 1.5px solid #fff; border-bottom: 1.5px solid #fff; transform: rotate(-45deg) translateY(-1px); display: block; }
    .project-info { padding: 0 12px 0 10px; overflow: hidden; }
    .project-client { font-size: 15px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .project-title { font-size: 12px; font-weight: 300; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .project-date { font-size: 13px; font-weight: 400; color: var(--text-muted); padding-right: 8px; }
    .project-date small { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dimmer); display: block; margin-bottom: 2px; }
    .factuur { font-size: 13px; font-weight: 500; color: var(--accent); letter-spacing: 0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 8px; text-shadow: 0 0 12px rgba(208,115,53,0.4); }
    .status-wrap { display: flex; align-items: center; gap: 0; justify-content: space-between; padding-right: 8px; }
    .row-actions { display: flex; align-items: center; gap: 2px; }
    .status-badge { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 5px 10px; white-space: nowrap; font-family: 'Poppins', sans-serif; }
    .status-productie { background: linear-gradient(135deg, rgba(208,115,53,0.18) 0%, rgba(208,115,53,0.08) 100%); color: var(--accent); border: 1px solid var(--accent-border); box-shadow: 0 0 8px rgba(208,115,53,0.2); }
    .status-afgerond { background: rgba(255,255,255,0.04); color: var(--text-dim); border: 1px solid var(--border); }
    .delete-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 16px; padding: 6px 8px; transition: color 0.2s; line-height: 1; }
    .delete-btn:hover { color: #c0392b; }
    .expand-btn { background: none; border: none; color: #666; cursor: pointer; font-size: 14px; padding: 6px 8px; transition: color 0.2s, transform 0.2s; line-height: 1; display: flex; align-items: center; }
    .expand-btn:hover { color: #aaa; }
    .expand-btn.open { transform: rotate(90deg); color: var(--accent); text-shadow: 0 0 8px rgba(208,115,53,0.5); }
    .project-detail { display: none; background: linear-gradient(180deg, #1e1e1e 0%, #1a1a1a 100%); border-bottom: 1px solid var(--border); border-left: 2px solid var(--accent); padding: 20px 28px 20px 70px; box-shadow: inset 0 1px 0 rgba(208,115,53,0.15); }
    .project-detail.open { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .detail-section { }
    .detail-section-title { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dimmer); margin-bottom: 12px; }
    .detail-field { display: flex; flex-direction: column; gap: 3px; margin-bottom: 12px; }
    .detail-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dimmer); }
    .detail-value { font-size: 13px; font-weight: 400; color: var(--text-muted); }
    .detail-value a { color: var(--accent); text-decoration: none; }
    .detail-value a:hover { text-decoration: underline; }
    .detail-value.empty { color: var(--text-faint); font-style: italic; }
    .comments-area { width: 100%; background: #202020; border: 1px solid var(--border); color: var(--text); font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 400; padding: 10px 12px; outline: none; resize: vertical; min-height: 80px; transition: border-color 0.2s; line-height: 1.6; }
    .comments-area:focus { border-color: var(--accent); }
    .comments-area::placeholder { color: #3a3a3a; }
    .detail-save-btn { margin-top: 8px; background: none; border: 1px solid var(--border); color: var(--text-dim); font-family: 'Poppins', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 7px 16px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    .detail-save-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px rgba(208,115,53,0.2); }
    .edit-field { width: 100%; background: #202020; border: 1px solid var(--border); color: var(--text); font-family: 'Poppins', sans-serif; font-size: 12px; padding: 7px 10px; outline: none; transition: border-color 0.2s; }
    .edit-field:focus { border-color: var(--accent); }
    .empty { padding: 56px 32px; text-align: center; color: var(--text-faint); font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: var(--bg-dark); border: 1px solid var(--border); padding: 30px; width: 440px; max-width: 94vw; }
    .modal-title { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); margin-bottom: 22px; }
    .form-group { margin-bottom: 14px; }
    .form-label { font-size: 9px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); display: block; margin-bottom: 6px; }
    .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 400; padding: 10px 12px; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: #3a3a3a; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }
    .btn-cancel { background: none; border: 1px solid var(--border); color: var(--text-muted); font-family: 'Poppins', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 9px 18px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
    .btn-cancel:hover { border-color: #555; color: #aaa; }
    .btn-save { background: var(--accent); border: none; color: #fff; font-family: 'Poppins', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; padding: 9px 22px; cursor: pointer; transition: background 0.2s; }
    .btn-save:hover { background: var(--accent-hover); }
    @media (max-width: 768px) {
      .col-head { display: none; }
      .sync-bar { padding: 6px 20px; }
      .project-row { grid-template-columns: 28px 1fr auto; grid-template-rows: auto auto; padding: 14px 20px; min-height: unset; gap: 4px; }
      .project-check { grid-row: 1 / 3; align-self: start; margin-top: 3px; }
      .project-info { grid-column: 2; grid-row: 1; padding: 0 8px; }
      .project-date { display: none; }
      .factuur { grid-column: 2; grid-row: 2; padding: 0 8px; font-size: 10px; }
      .status-wrap { grid-column: 3; grid-row: 1 / 3; flex-direction: column; align-items: flex-end; gap: 6px; }
      .header { padding: 10px 20px; }
      .header-brand-text { display: none; }
      .filters { padding: 10px 20px; }
      .stat { padding: 12px 20px; }
    }
  </style>
</head>
<body>
  <!-- LOGIN SCREEN -->
  <div id="login-screen" style="display:none; min-height:100vh; background: #181818; align-items:center; justify-content:center; position:relative; overflow:hidden;">
    <!-- Background gradient orbs -->
    <div style="position:absolute;top:-200px;left:-200px;width:600px;height:600px;background:radial-gradient(circle, rgba(208,115,53,0.12) 0%, transparent 70%);pointer-events:none;"></div>
    <div style="position:absolute;bottom:-150px;right:-100px;width:500px;height:500px;background:radial-gradient(circle, rgba(208,115,53,0.08) 0%, transparent 70%);pointer-events:none;"></div>
    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:800px;height:800px;background:radial-gradient(circle, rgba(208,115,53,0.04) 0%, transparent 60%);pointer-events:none;"></div>

    <div style="position:relative;z-index:1;width:100%;max-width:400px;padding:0 24px;">
      <!-- Logo area -->
      <div style="text-align:center;margin-bottom:40px;">
        <div style="font-size:11px;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:#fff;margin-bottom:8px;">ONE<span style="color:#d07335;">MAN</span>CREW</div>
        <div style="font-size:12px;font-weight:400;color:#555;letter-spacing:0.08em;">Projectbeheer</div>
      </div>

      <!-- Card -->
      <div style="background:linear-gradient(180deg,#1e1e1e 0%,#1a1a1a 100%);border:1px solid #2e2e2e;border-top:2px solid #d07335;padding:36px 32px;box-shadow:0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(208,115,53,0.08);">
        <div style="font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#d07335;margin-bottom:24px;">Inloggen</div>

        <form onsubmit="handleLogin(event)">
          <div style="margin-bottom:16px;">
            <label style="display:block;font-size:9px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#555;margin-bottom:6px;">E-mailadres</label>
            <input id="login-email" type="email" required autocomplete="email"
              style="width:100%;background:#202020;border:1px solid #2e2e2e;color:#fff;font-family:'Poppins',sans-serif;font-size:13px;padding:11px 13px;outline:none;transition:border-color 0.2s;"
              onfocus="this.style.borderColor='#d07335'" onblur="this.style.borderColor='#2e2e2e'"
              placeholder="jouw@email.nl" />
          </div>
          <div style="margin-bottom:24px;">
            <label style="display:block;font-size:9px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#555;margin-bottom:6px;">Wachtwoord</label>
            <input id="login-password" type="password" required autocomplete="current-password"
              style="width:100%;background:#202020;border:1px solid #2e2e2e;color:#fff;font-family:'Poppins',sans-serif;font-size:13px;padding:11px 13px;outline:none;transition:border-color 0.2s;"
              onfocus="this.style.borderColor='#d07335'" onblur="this.style.borderColor='#2e2e2e'"
              placeholder="••••••••" />
          </div>
          <div id="login-error" style="font-size:11px;color:#e05a3a;margin-bottom:16px;min-height:16px;font-weight:500;"></div>
          <button id="login-btn" type="submit"
            style="width:100%;background:linear-gradient(135deg,#e8854a 0%,#d07335 50%,#b85e25 100%);color:#fff;border:none;padding:13px 20px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 20px rgba(208,115,53,0.4);"
            onmouseover="this.style.boxShadow='0 6px 28px rgba(208,115,53,0.6)';this.style.transform='translateY(-1px)'"
            onmouseout="this.style.boxShadow='0 4px 20px rgba(208,115,53,0.4)';this.style.transform='translateY(0)'">
            Inloggen
          </button>
        </form>
      </div>

      <div style="text-align:center;margin-top:24px;font-size:10px;color:#333;letter-spacing:0.06em;">
        © ONEMANCREW — Jaimy van der Meer
      </div>
    </div>
  </div>

  <!-- APP SCREEN -->

      <div class="header-brand-text">ONE<span>MAN</span>CREW</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="btn-add" onclick="openModal()">+ Nieuw project</button>
      <button onclick="handleLogout()" style="background:none;border:1px solid #3a3a3a;color:#666;font-family:'Poppins',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:9px 14px;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.borderColor='#666';this.style.color='#aaa'" onmouseout="this.style.borderColor='#3a3a3a';this.style.color='#666'">Uitloggen</button>
    </div>
  </header>
  <div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label">Verbinden met Firebase...</span>
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('alles', this)">Alles</button>
    <button class="filter-btn" onclick="setFilter('productie', this)">In productie</button>
    <button class="filter-btn" onclick="setFilter('afgerond', this)">Afgerond</button>
  </div>
  <div class="stats" id="stats"></div>
  <div class="col-head">
    <div></div>
    <div>Klant / Project</div>
    <div>Opnamedatum</div>
    <div>Leverdatum</div>
    <div>Factuur</div>
    <div>Status</div>
  </div>
  <div id="projects-list"><div class="empty">Laden...</div></div>
  <div id="modal-container"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyBmtWdiibXy6ivvzSJRX1hkG59YCofrk2o",
      authDomain: "onemancrew-planner.firebaseapp.com",
      projectId: "onemancrew-planner",
      storageBucket: "onemancrew-planner.firebasestorage.app",
      messagingSenderId: "133755063145",
      appId: "1:133755063145:web:72e55ae2484d152efccbf8",
      measurementId: "G-Y8DK35FC3J"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const col = collection(db, 'projects');
    let projects = [], activeFilter = 'alles';

    function setSyncStatus(state, label) {
      document.getElementById('sync-dot').className = 'sync-dot' + (state ? ' ' + state : '');
      document.getElementById('sync-label').textContent = label;
    }

    // Auth state — show/hide app vs login
    let unsubscribeSnapshot = null;

    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'block';
        setSyncStatus('syncing', 'Verbinden met Firebase...');
        if (unsubscribeSnapshot) unsubscribeSnapshot();
        unsubscribeSnapshot = onSnapshot(col, snapshot => {
      projects = snapshot.docs.map(d => ({ _id: d.id, ...d.data() }));
      projects.sort((a, b) => (a.createdAt?.seconds ?? 0) - (b.createdAt?.seconds ?? 0));
      setSyncStatus('ok', 'Gesynchroniseerd');
      render();
        }, err => {
          console.error(err);
          setSyncStatus('error', 'Verbinding mislukt — controleer je internetverbinding');
        });
      } else {
        if (unsubscribeSnapshot) { unsubscribeSnapshot(); unsubscribeSnapshot = null; }
        document.getElementById('app-screen').style.display = 'none';
        document.getElementById('login-screen').style.display = 'flex';
      }
    });

    // Login form handler
    window.handleLogin = async function(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('login-error');
      err.textContent = '';
      btn.textContent = 'Inloggen...';
      btn.disabled = true;
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch(e) {
        err.textContent = 'Onjuist e-mailadres of wachtwoord.';
        btn.textContent = 'Inloggen';
        btn.disabled = false;
      }
    };

    window.handleLogout = async function() {
      await signOut(auth);
    };

    function fmt(d) {
      if (!d) return '—';
      return new Date(d + 'T00:00:00').toLocaleDateString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function esc(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    const expandedIds = new Set();

    window.handleRowClick = function(e, id) {
      toggleExpand(id);
    };

    window.toggleExpand = function(id) {
      if (expandedIds.has(id)) { expandedIds.delete(id); } else { expandedIds.add(id); }
      render();
    };

    window.saveContact = async function(id) {
      const name = document.getElementById('cn-' + id)?.value.trim() || '';
      const email = document.getElementById('ce-' + id)?.value.trim() || '';
      const phone = document.getElementById('cp-' + id)?.value.trim() || '';
      setSyncStatus('syncing', 'Opslaan...');
      try {
        await updateDoc(doc(db, 'projects', id), { contactName: name, contactEmail: email, contactPhone: phone });
      } catch(e) { setSyncStatus('error', 'Opslaan mislukt'); }
    };

    window.saveComment = async function(id) {
      const comments = document.getElementById('cmt-' + id)?.value || '';
      setSyncStatus('syncing', 'Opslaan...');
      try {
        await updateDoc(doc(db, 'projects', id), { comments });
      } catch(e) { setSyncStatus('error', 'Opslaan mislukt'); }
    };

    window.setFilter = function(f, el) {
      activeFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      render();
    };

    window.toggleDone = async function(id) {
      const p = projects.find(x => x._id === id);
      if (!p) return;
      setSyncStatus('syncing', 'Opslaan...');
      try { await updateDoc(doc(db, 'projects', id), { done: !p.done }); }
      catch(e) { setSyncStatus('error', 'Opslaan mislukt'); }
    };

    window.deleteProject = async function(id) {
      if (!confirm('Project verwijderen?')) return;
      setSyncStatus('syncing', 'Verwijderen...');
      try { await deleteDoc(doc(db, 'projects', id)); }
      catch(e) { setSyncStatus('error', 'Verwijderen mislukt'); }
    };

    function render() {
      let filtered = projects;
      if (activeFilter === 'productie') filtered = projects.filter(p => !p.done);
      if (activeFilter === 'afgerond') filtered = projects.filter(p => p.done);
      const total = projects.length, prod = projects.filter(p => !p.done).length, done = projects.filter(p => p.done).length;
      document.getElementById('stats').innerHTML =
        '<div class="stat"><div class="stat-num">' + total + '</div><div class="stat-label">Totaal</div></div>' +
        '<div class="stat"><div class="stat-num accent">' + prod + '</div><div class="stat-label">In productie</div></div>' +
        '<div class="stat"><div class="stat-num dim">' + done + '</div><div class="stat-label">Afgerond</div></div>';
      if (!filtered.length) { document.getElementById('projects-list').innerHTML = '<div class="empty">Geen projecten gevonden</div>'; return; }
      document.getElementById('projects-list').innerHTML = filtered.map(p => {
        const isOpen = expandedIds.has(p._id);
        const contactName = p.contactName || '';
        const contactEmail = p.contactEmail || '';
        const contactPhone = p.contactPhone || '';
        const comments = p.comments || '';
        return '<div class="project-row ' + (p.done ? 'completed' : '') + '" style="cursor:pointer" onclick="handleRowClick(event,\'' + p._id + '\')">' +
          '<div class="project-check ' + (p.done ? 'checked' : '') + '" onclick="event.stopPropagation();toggleDone(\'' + p._id + '\')" title="' + (p.done ? 'Markeer als in productie' : 'Markeer als afgerond') + '"></div>' +
          '<div class="project-info"><div class="project-client">' + esc(p.client) + '</div><div class="project-title">' + esc(p.title) + '</div></div>' +
          '<div class="project-date"><small>Opname</small>' + fmt(p.opname) + '</div>' +
          '<div class="project-date"><small>Levering</small>' + fmt(p.levering) + '</div>' +
          '<div class="factuur">' + esc(p.factuur) + '</div>' +
          '<div class="status-wrap">' +
            '<span class="status-badge ' + (p.done ? 'status-afgerond' : 'status-productie') + '">' + (p.done ? 'Afgerond' : 'Productie') + '</span>' +
            '<div class="row-actions" onclick="event.stopPropagation()">' +
              '<button class="expand-btn ' + (isOpen ? 'open' : '') + '" onclick="toggleExpand(\'' + p._id + '\')" title="Uitklappen">&#9658;</button>' +
              '<button class="delete-btn" onclick="deleteProject(\'' + p._id + '\')" title="Verwijder">&#x1F5D1;</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="project-detail ' + (isOpen ? 'open' : '') + '" id="detail-' + p._id + '">' +
          '<div class="detail-section">' +
            '<div class="detail-section-title">Klantgegevens</div>' +
            '<div class="detail-field"><div class="detail-label">Naam</div><input class="edit-field" id="cn-' + p._id + '" value="' + esc(contactName) + '" placeholder="Naam contactpersoon" /></div>' +
            '<div class="detail-field"><div class="detail-label">E-mail</div><input class="edit-field" id="ce-' + p._id + '" value="' + esc(contactEmail) + '" placeholder="email@bedrijf.nl" /></div>' +
            '<div class="detail-field"><div class="detail-label">Telefoon</div><input class="edit-field" id="cp-' + p._id + '" value="' + esc(contactPhone) + '" placeholder="+31 6 00000000" /></div>' +
            '<button class="detail-save-btn" onclick="saveContact(\'' + p._id + '\')">Opslaan</button>' +
          '</div>' +
          '<div class="detail-section">' +
            '<div class="detail-section-title">Notities</div>' +
            '<textarea class="comments-area" id="cmt-' + p._id + '" placeholder="Voeg notities toe...">' + esc(comments) + '</textarea>' +
            '<button class="detail-save-btn" onclick="saveComment(\'' + p._id + '\')">Opslaan</button>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    window.openModal = function(editId) {
      const p = editId ? projects.find(x => x._id === editId) : null;
      document.getElementById('modal-container').innerHTML =
        '<div class="modal-overlay" onclick="overlayClose(event)">' +
          '<div class="modal">' +
            '<div class="modal-title">' + (p ? 'Project bewerken' : 'Nieuw project toevoegen') + '</div>' +
            '<div class="form-group"><label class="form-label">Klantnaam</label><input class="form-input" id="f-client" placeholder="Bijv. Rabobank" value="' + (p ? esc(p.client) : '') + '" /></div>' +
            '<div class="form-group"><label class="form-label">Projectomschrijving</label><input class="form-input" id="f-title" placeholder="Bijv. Corporate film" value="' + (p ? esc(p.title) : '') + '" /></div>' +
            '<div class="form-row"><div class="form-group"><label class="form-label">Opnamedatum</label><input class="form-input" id="f-opname" type="date" value="' + (p ? p.opname : '') + '" /></div>' +
            '<div class="form-group"><label class="form-label">Leverdatum</label><input class="form-input" id="f-levering" type="date" value="' + (p ? p.levering : '') + '" /></div></div>' +
            '<div class="form-group"><label class="form-label">Factuurnummer</label><input class="form-input" id="f-factuur" placeholder="Bijv. OMC-2025-005" value="' + (p ? esc(p.factuur) : '') + '" /></div>' +
            '<div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Annuleren</button><button class="btn-save" onclick="saveProject(\'' + (editId || '') + '\')">Opslaan</button></div>' +
          '</div></div>';
      setTimeout(() => document.getElementById('f-client').focus(), 50);
    };

    window.overlayClose = function(e) { if (e.target.classList.contains('modal-overlay')) window.closeModal(); };
    window.closeModal = function() { document.getElementById('modal-container').innerHTML = ''; };

    window.saveProject = async function(editId) {
      const client = document.getElementById('f-client').value.trim();
      const title = document.getElementById('f-title').value.trim();
      const opname = document.getElementById('f-opname').value;
      const levering = document.getElementById('f-levering').value;
      const factuur = document.getElementById('f-factuur').value.trim() || '—';
      if (!client) { document.getElementById('f-client').focus(); return; }
      setSyncStatus('syncing', 'Opslaan...');
      window.closeModal();
      try {
        if (editId) { await updateDoc(doc(db, 'projects', editId), { client, title, opname, levering, factuur }); }
        else { await addDoc(col, { client, title, opname, levering, factuur, done: false, createdAt: serverTimestamp() }); }
      } catch(e) { setSyncStatus('error', 'Opslaan mislukt'); }
    };

    document.addEventListener('keydown', e => { if (e.key === 'Escape') window.closeModal(); });
  </script>
  </div><!-- /app-screen -->
</body>
</html>
